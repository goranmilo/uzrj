services:
  postgres:
    image: postgres:16-alpine
    container_name: uzrj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uzrj}
      POSTGRES_USER: ${POSTGRES_USER:-uzrj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uzrj}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uzrj}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uzrj-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uzrj-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-uzrj}:${POSTGRES_PASSWORD:-uzrj}@postgres:5432/${POSTGRES_DB:-uzrj}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@uzrj.rs}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-UZRJ}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uzrj-celery
    restart: unless-stopped
    command: celery -A app.tasks worker -l info -c 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-uzrj}:${POSTGRES_PASSWORD:-uzrj}@postgres:5432/${POSTGRES_DB:-uzrj}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@uzrj.rs}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-UZRJ}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uzrj-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"

  nginx:
    image: nginx:alpine
    container_name: uzrj-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  certbot_data:
