<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #2563eb; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { background-color: #f9fafb; padding: 30px; border: 1px solid #e5e7eb; }
        .footer { background-color: #f3f4f6; padding: 15px; text-align: center; font-size: 12px; color: #6b7280; border-radius: 0 0 8px 8px; }
        .code { background-color: #e5e7eb; padding: 20px; text-align: center; font-size: 32px; font-weight: bold; letter-spacing: 8px; margin: 20px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ app_name }}</h1>
        </div>
        <div class="content">
            <h2>Dvofaktorska autentikacija</h2>
            <p>Vaš verifikacioni kod je:</p>
            <div class="code">{{ code }}</div>
            <p>Ovaj kod važi 5 minuta.</p>
            <p>Ako niste vi zatražili ovaj kod, ignorišite ovaj email.</p>
        </div>
        <div class="footer">
            <p>Ovaj email je automatski generisan. Molimo vas da ne odgovarate na njega.</p>
            <p>&copy; 2026 {{ app_name }}. Sva prava zadržana.</p>
        </div>
    </div>
</body>
</html>
